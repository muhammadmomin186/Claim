        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .login-card, .dashboard-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .login-card h2, .dashboard-card h3 {
            color: #667eea;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .nav-buttons button {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .nav-buttons button.active {
            background: white;
            color: #667eea;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #667eea;
            color: white;
        }

        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
        }

        .status-assigned { background: #ffc107; color: #000; }
        .status-received { background: #17a2b8; color: #fff; }
        .status-resolved { background: #28a745; color: #fff; }

        .notification {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .notification.unread {
            background: #fff3e0;
            border-left-color: #ff9800;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h2 {
            font-size: 36px;
            color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: white;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .nav-buttons button {
                font-size: 12px;
                padding: 8px 12px;
            }
            th, td {

                padding: 8px;
            }

                document.getElementById('dashboardSection').classList.remove('hidden');
                document.getElementById('userNameDisplay').innerText = roleNames[role];
                
                // Show/hide admin buttons
                if (role !== 'admin') {
                    document.getElementById('navAssign').style.display = 'none';
                    document.getElementById('navAlltasks').style.display = 'none';
                } else {
                    document.getElementById('navAssign').style.display = 'inline-block';
                    document.getElementById('navAlltasks').style.display = 'inline-block';
                }
                
                // Initialize database
                await initDatabase();
                
                // Setup realtime listeners
                setupRealtimeListeners();
                
                showPage('dashboard');
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        });
        
        // Setup realtime listeners
        function setupRealtimeListeners() {
            // Claims listener
            const claimsRef = collection(db, "claims");
            let q = claimsRef;
            if (currentUserRole !== 'admin') {
                q = query(claimsRef, where("assignedTo", "==", currentUserRole));
            }
            
            if (unsubscribeClaims) unsubscribeClaims();
            unsubscribeClaims = onSnapshot(q, () => {
                if (document.getElementById('dashboardSection').classList.contains('hidden')) return;
                const activePage = document.querySelector('.nav-buttons button.active')?.innerText;
                if (!activePage || activePage.includes('Dashboard')) showPage('dashboard');
                else if (activePage.includes('My Tasks')) showPage('mytasks');
                else if (activePage.includes('All Claims')) showPage('alltasks');
                updateNotificationBadge();
            });
            
            // Notifications listener
            const notifsRef = collection(db, "notifications");
            const notifQuery = query(notifsRef, where("userId", "==", currentUserRole));
            if (unsubscribeNotifs) unsubscribeNotifs();
            unsubscribeNotifs = onSnapshot(notifQuery, () => {
                updateNotificationBadge();
                if (document.getElementById('pageContent').innerHTML.includes('Notifications')) {
                    showPage('notifications');
                }
            });
        }
        
        // Logout
        window.logout = async function() {
            await signOut(auth);
            if (unsubscribeClaims) unsubscribeClaims();
            if (unsubscribeNotifs) unsubscribeNotifs();
            currentUser = null;
            currentUserRole = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashboardSection').classList.add('hidden');
        };
        
        // Update notification badge
        async function updateNotificationBadge() {
            if (!currentUserRole) return;
            const notifsRef = collection(db, "notifications");
            const q = query(notifsRef, where("userId", "==", currentUserRole), where("read", "==", false));
            const snapshot = await getDocs(q);
            const badge = document.getElementById('notifCount');
            if (badge) {
                badge.textContent = snapshot.size > 0 ? snapshot.size : '';
            }
        }
        
        // Add notification
        async function addNotification(userId, title, message, claimId) {
            await addDoc(collection(db, "notifications"), {
                userId: userId,
                title: title,
                message: message,
                claimId: claimId,
                read: false,
                createdAt: new Date().toISOString()
            });
        }
        
        // Show page
        window.showPage = async function(page) {
            const contentDiv = document.getElementById('pageContent');
            contentDiv.innerHTML = '<div class="loading">Loading...</div>';
            
            if (page === 'dashboard') await showDashboard(contentDiv);
            else if (page === 'assign') await showAssignPage(contentDiv);
            else if (page === 'mytasks') await showMyTasks(contentDiv);
            else if (page === 'alltasks') await showAllTasks(contentDiv);
            else if (page === 'parties') await showParties(contentDiv);
            else if (page === 'notifications') await showNotifications(contentDiv);
            
            // Update active button
            document.querySelectorAll('.nav-buttons button').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`nav${page.charAt(0).toUpperCase() + page.slice(1)}`);
            if (activeBtn) activeBtn.classList.add('active');
        };
        
        // Dashboard
        async function showDashboard(container) {
            const claimsRef = collection(db, "claims");
            let q = claimsRef;
            if (currentUserRole !== 'admin') {
                q = query(claimsRef, where("assignedTo", "==", currentUserRole));
            }
            const snapshot = await getDocs(q);
            const claims = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const assigned = claims.filter(c => c.status === 'assigned').length;
            const received = claims.filter(c => c.status === 'received').length;
            const resolved = claims.filter(c => c.status === 'resolved').length;
            
            container.innerHTML = `
                <div class="stats">
                    <div class="stat-card"><h2>${assigned}</h2><p>📋 Assigned</p></div>
                    <div class="stat-card"><h2>${received}</h2><p>📦 Received</p></div>
                    <div class="stat-card"><h2>${resolved}</h2><p>✅ Resolved</p></div>
                    <div class="stat-card"><h2>${claims.length}</h2><p>📊 Total</p></div>
                </div>
                <div class="dashboard-card">
                    <h3>Recent Claims</h3>
                    <table><thead><tr><th>Party</th><th>Product</th><th>Qty</th><th>Claim Type</th><th>Staff</th><th>Status</th><th>Date</th></tr></thead>
                    <tbody>
                        ${claims.slice(0, 10).map(claim => `
                            <tr>
                                <td>${claim.partyName || '-'}</td>
                                <td>${claim.productName || '-'}</td>
                                <td>${claim.quantity || 0}</td>
                                <td><span class="status-badge" style="background:#6c757d; color:white">${claim.claimType || 'Customer Claim'}</span></td>
                                <td>${roleNames[claim.assignedTo] || claim.assignedTo}</td>
                                <td><span class="status-badge status-${claim.status}">${claim.status}</span></td>
                                <td>${claim.createdAt ? new Date(claim.createdAt).toLocaleDateString() : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody></table>
                </div>
            `;
        }
        
        // Assign Page
        async function showAssignPage(container) {
            const partiesSnapshot = await getDocs(collection(db, "parties"));
            const parties = partiesSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            const productsSnapshot = await getDocs(collection(db, "products"));
            const products = productsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            container.innerHTML = `
                <div class="dashboard-card">
                    <h3>➕ Assign New Claim</h3>
                    <form id="assignForm">
                        <div class="form-group">
                            <label>Select Party:</label>
                            <select id="partySelect" required>
                                <option value="">Select Party</option>
                                ${parties.map(p => `<option value="${p.shop}">${p.shop} (${p.booker})</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Select Product:</label>
                            <select id="productSelect" required>
                                <option value="">Select Product</option>
                                ${products.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Quantity:</label>
                            <input type="number" id="quantity" required min="1">
                        </div>
                        <div class="form-group">
                            <label>Claim Type:</label>
                            <select id="claimType" required>
                                <option value="Customer Claim">🏪 Customer Claim</option>
                                <option value="Counter Claim">🔄 Counter Claim</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Assign To:</label>
                            <select id="assignTo" required>
                                <option value="">Select Staff</option>
                                <option value="staff1">Claim Staff 1</option>
                                <option value="staff2">Claim Staff 2</option>
                                <option value="staff3">Claim Staff 3</option>
                                <option value="staff4">Claim Staff 4</option>
                                <option value="staff5">Claim Staff 5</option>
                                <option value="staff6">Claim Staff 6</option>
                                <option value="staff7">Claim Staff 7</option>
                                <option value="staff8">Claim Staff 8</option>
                                <option value="staff9">Claim Staff 9</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Issue Description:</label>
                            <textarea id="description" rows="3"></textarea>
                        </div>
                        <button type="submit">Assign Claim</button>
                    </form>
                </div>
            `;
            
            document.getElementById('assignForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                await assignClaim();
            });
        }
        
        // Assign claim
        async function assignClaim() {
            const party = document.getElementById('partySelect').value;
            const product = document.getElementById('productSelect').value;
            const quantity = document.getElementById('quantity').value;
            const claimType = document.getElementById('claimType').value;
            const assignTo = document.getElementById('assignTo').value;
            const description = document.getElementById('description').value;
            
            if (!party || !product || !quantity || !assignTo) {
                alert('Please fill all required fields');
                return;
            }
            
            try {
                const claimData = {
                    partyName: party,
                    productName: product,
                    quantity: parseInt(quantity),
                    claimType: claimType,
                    assignedTo: assignTo,
                    assignedBy: currentUserRole,
                    status: 'assigned',
                    description: description,
                    createdAt: new Date().toISOString(),
                    receivedDate: null,
                    resolvedDate: null,
                    notes: []
                };
                
                const docRef = await addDoc(collection(db, "claims"), claimData);
                await addNotification(assignTo, 'New Claim Assigned', `${claimType}: ${party} - ${product} (Qty: ${quantity})`, docRef.id);
                
                alert('Claim assigned successfully!');
                document.getElementById('assignForm').reset();
                showPage('dashboard');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // My Tasks
        async function showMyTasks(container) {
            const claimsRef = collection(db, "claims");
            const q = query(claimsRef, where("assignedTo", "==", currentUserRole));
            const snapshot = await getDocs(q);
            const claims = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            container.innerHTML = `
                <div class="dashboard-card">
                    <h3>📋 My Tasks (${claims.length})</h3>
                    <table><thead><tr><th>Party</th><th>Product</th><th>Qty</th><th>Claim Type</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody>
                        ${claims.map(claim => `
                            <tr>
                                <td>${claim.partyName}</td>
                                <td>${claim.productName}</td>
                                <td>${claim.quantity}</td>
                                <td><span class="status-badge" style="background:#6c757d; color:white">${claim.claimType || 'Customer Claim'}</span></td>
                                <td><span class="status-badge status-${claim.status}">${claim.status}</span></td>
                                <td>${new Date(claim.createdAt).toLocaleDateString()}</td>
                                <td>
                                    ${claim.status === 'assigned' ? `<button onclick="markReceived('${claim.id}')" class="btn-warning" style="padding:5px 10px; font-size:12px;">📦 Mark Received</button>` : ''}
                                    ${claim.status === 'received' ? `<button onclick="markResolved('${claim.id}')" class="btn-success" style="padding:5px 10px; font-size:12px;">✅ Mark Resolved</button>` : ''}
                                    <button onclick="viewClaim('${claim.id}')" style="padding:5px 10px; font-size:12px;">👁️ View</button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody></table>
                </div>
            `;
            
            window.markReceived = async (claimId) => {
                const claimRef = doc(db, "claims", claimId);
                await updateDoc(claimRef, {
                    status: 'received',
                    receivedDate: new Date().toISOString()
                });
                const claimDoc = await getDoc(claimRef);
                const claim = claimDoc.data();
                await addNotification('admin', 'Product Received', `${roleNames[currentUserRole]} received: ${claim.partyName} - ${claim.productName}`, claimId);
                alert('Marked as received!');
                showMyTasks(container);
            };
            
            window.markResolved = async (claimId) => {
                const claimRef = doc(db, "claims", claimId);
                await updateDoc(claimRef, {
                    status: 'resolved',
                    resolvedDate: new Date().toISOString()
                });
                const claimDoc = await getDoc(claimRef);
                const claim = claimDoc.data();
                await addNotification('admin', 'Claim Resolved', `${roleNames[currentUserRole]} resolved: ${claim.partyName} - ${claim.productName}`, claimId);
                alert('Marked as resolved!');
                showMyTasks(container);
            };
            
            window.viewClaim = async (claimId) => {
                const claimRef = doc(db, "claims", claimId);
                const claimDoc = await getDoc(claimRef);
                const claim = claimDoc.data();
                
                container.innerHTML = `
                    <div class="dashboard-card">
                        <h3>🔍 Claim Details</h3>
                        <p><strong>Party:</strong> ${claim.partyName}</p>
                        <p><strong>Product:</strong> ${claim.productName}</p>
                        <p><strong>Quantity:</strong> ${claim.quantity}</p>
                        <p><strong>Claim Type:</strong> ${claim.claimType || 'Customer Claim'}</p>
                        <p><strong>Status:</strong> <span class="status-badge status-${claim.status}">${claim.status}</span></p>
                        <p><strong>Assigned To:</strong> ${roleNames[claim.assignedTo]}</p>
                        <p><strong>Assigned Date:</strong> ${new Date(claim.createdAt).toLocaleString()}</p>
                        ${claim.receivedDate ? `<p><strong>Received Date:</strong> ${new Date(claim.receivedDate).toLocaleString()}</p>` : ''}
                        ${claim.resolvedDate ? `<p><strong>Resolved Date:</strong> ${new Date(claim.resolvedDate).toLocaleString()}</p>` : ''}
                        <p><strong>Description:</strong> ${claim.description || 'No description'}</p>
                        <button onclick="showPage('mytasks')">Back</button>
                    </div>
                `;
            };
        }
        
        // All Tasks (Admin)
        async function showAllTasks(container) {
            const snapshot = await getDocs(collection(db, "claims"));
            const claims = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            container.innerHTML = `
                <div class="dashboard-card">
                    <h3>📊 All Claims (${claims.length})</h3>
                    <table><thead><tr><th>Party</th><th>Product</th><th>Qty</th><th>Claim Type</th><th>Staff</th><th>Status</th><th>Date</th></tr></thead>
                    <tbody>
                        ${claims.map(claim => `
                            <tr>
                                <td>${claim.partyName || '-'}</td>
                                <td>${claim.productName || '-'}</td>
                                <td>${claim.quantity || 0}</td>
                                <td><span class="status-badge" style="background:#6c757d; color:white">${claim.claimType || 'Customer Claim'}</span></td>
                                <td>${roleNames[claim.assignedTo] || claim.assignedTo}</td>
                                <td><span class="status-badge status-${claim.status}">${claim.status}</span></td>
                                <td>${claim.createdAt ? new Date(claim.createdAt).toLocaleDateString() : '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody></table>
                </div>
            `;
        }
        
        // Parties
        async function showParties(container) {
            const snapshot = await getDocs(collection(db, "parties"));
            const parties = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            
            container.innerHTML = `
                <div class="dashboard-card">
                    <h3>🏪 Parties List (${parties.length} parties)</h3>
                    <input type="text" id="searchParties" placeholder="Search parties..." class="form-group" style="margin-bottom:15px;">
                    <table><thead><tr><th>Shop Name</th><th>Booker</th><th>Phone</th><th>Address</th></tr></thead>
                    <tbody id="partiesTable">
                        ${parties.map(p => `
                            <tr>
                                <td>${p.shop}</td>
                                <td>${p.booker}</td>
                                <td>${p.phone || '-'}</td>
                                <td>${p.address || '-'}</td>
                            </tr>
                        `).join('')}
                    </tbody></table>
                </div>
            `;
            
            document.getElementById('searchParties').addEventListener('keyup', (e) => {
                const search = e.target.value.toLowerCase();
                const filtered = parties.filter(p => p.shop.toLowerCase().includes(search) || p.booker.toLowerCase().includes(search));
                document.getElementById('partiesTable').innerHTML = filtered.map(p => `
                    <tr><td>${p.shop}</td><td>${p.booker}</td><td>${p.phone || '-'}</td><td>${p.address || '-'}</td></tr>
                `).join('');
            });
        }
        
        // Notifications
        async function showNotifications(container) {
            const notifsRef = collection(db, "notifications");
            const q = query(notifsRef, where("userId", "==", currentUserRole));
            const snapshot = await getDocs(q);
            const notifs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).reverse();
            
            container.innerHTML = `
                <div class="dashboard-card">
                    <h3>🔔 Notifications (${notifs.length})</h3>
                    ${notifs.map(notif => `
                        <div class="notification ${notif.read ? '' : 'unread'}">
                            <strong>${notif.title}</strong>
                            <p>${notif.message}</p>
                            <small>${new Date(notif.createdAt).toLocaleString()}</small>
                            ${!notif.read ? `<button onclick="markRead('${notif.id}')" style="float:right; padding:5px 10px;">Mark Read</button>` : ''}
                        </div>
                    `).join('')}
                    ${notifs.length === 0 ? '<p>No notifications</p>' : ''}
                </div>
            `;
            
            window.markRead = async (notifId) => {
                const notifRef = doc(db, "notifications", notifId);
                await updateDoc(notifRef, { read: true });
                showNotifications(container);
                updateNotificationBadge();
            };
        }

        // Auto-create users on load
        // createDefaultUsers(); // Uncomment if needed
        
        // Check auth state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboardSection').classList.remove('hidden');
            }
        });
    </script>
